<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
<div class="container">
    <form id="form" action="/">
        <h1>Register for the Event!</h1>
        <div class="input-group">
            <label for="username"><b>username :</b></label>
            <input type="text" id="username" name="username">
            <div class="error" ></div>
        </div>
        <div class="input-group">
            <label for="last"><b>Last name :</b></label>
            <input type="text" id="lastname" name="lastname">
            <div class="error" ></div>
        </div>
        <div class="input-group">
            <label for="gender"><b>Gender :</b><br>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="femele"> Female
            <input type="radio" name="gender" value="other"> other
        </label>
        </div>
        <div class="input-group">
            <label for="email"><b>Email :</b></label>
            <input type="text" id="email" name="email">
            <div class="error" ></div>
        </div>
        <div class="input-group">
             <label for="password"><b>"password :</b></label>
             <input type="password" id="password" name="password">
             <div class="error" ></div>
        </div>
        <div class="input-group">
             <label for="cpassword"><b>"confirm password :</b></label>
             <input type="password" id="cpassword" name="cpassword">
             <div class="error" ></div>
        </div>
        <div class="input-group">
             <label for="mobile"><b>contact :</b></label>
             <input type="text" id="mobile"
                    name="mobile"
                    placeholder="Enter Your Mobile Number" required
                    maxlength="10">
        </div>
        <div class="input-group">
            <label for="Skillset"><b>Skillset :</b><br>
            <input type="checkbox" name="Skillset" value="Java"> java
            <input type="checkbox" name="Skillset" value="Python"> python
            <input type="checkbox" name="Skillset" value="C++"> C++
            <input type="checkbox" name="Skillset" value="Dbms"> Dbms
        </label>
        <br>
        <button type="submit">Registration</button>
    </form>
       </div>
</body>
</html>
